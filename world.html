<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nocturne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════ DETAIL ════════ -->
<div id="detail" class="page active">

  <div class="detail-topbar">
    <button class="back-btn" onclick="history.back()">← Nocturne</button>
    <div class="topbar-name" id="d-topname"></div>
    <div class="topbar-num" id="d-topnum"></div>
  </div>

  <!-- 角色 + 画廊 -->
  <div class="d-sec" id="sec-cg">
    <div class="sec-lbl">CHARACTER · GALLERY</div>
    <div class="cg-grid">
      <div class="char-stack" id="d-chars"></div>
      <div class="gal-wrap">
        <div class="gal-grid" id="d-gallery"></div>
        <button class="gal-more-btn" id="gal-more-btn" onclick="galModalOpen()">Gallery →</button>
      </div>
    </div>
  </div>

  <!-- 视频 + 小说 -->
  <div class="d-sec" id="sec-vn">
    <div class="sec-lbl">HANDWRITING · NOVEL</div>
    <div class="vn-grid">

      <div class="vid-wrap">
        <div class="vid-frame" id="d-vframe">
          <div class="vid-ph"><div class="vi">▷</div><p>VIDEO<br>PLACEHOLDER</p></div>
        </div>
        <div class="vid-info">
          <span class="v-t" id="d-vtitle">手书</span>
          <span class="v-d" id="d-vdate">—</span>
        </div>
      </div>

      <div class="nv-wrap">
        <div class="nv-head">
          <span class="nv-title" id="d-nvtitle">—</span>
          <span class="nv-pg" id="d-nvpg">01 / 01</span>
        </div>
        <div class="nv-body" id="d-nvbody"></div>
        <div class="nv-foot">
          <button class="nvbtn" id="nvprev" onclick="nvFlip(-1)">← PREV</button>
          <div class="nv-dots" id="nvdots"></div>
          <button class="nvbtn" id="nvnext" onclick="nvFlip(1)">NEXT →</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 对话 -->
  <div class="d-sec" id="sec-chat">
    <div class="sec-lbl">DIALOGUE</div>

    <div class="chat-outer">

      <!-- 左侧：悠葉游戏入口 -->
      <div class="game-side game-side-left" id="game-btn-0" onclick="bjOpen(0)">
        <div class="game-side-icon">♠</div>
        <div class="game-side-label">与老板<br>玩一局</div>
        <div class="game-side-sub">21 POINT</div>
      </div>

      <!-- 中间：对话框 -->
      <div class="chat-wrap">
        <div class="chat-tabs" id="d-ctabs"></div>
        <div class="chat-box">
          <div class="chat-hd">
            <div class="chat-av" id="d-cav">—</div>
            <div>
              <div class="chat-cn" id="d-cname">—</div>
              <div class="chat-cr" id="d-crole">—</div>
            </div>
            <div class="chat-ol">ONLINE</div>
          </div>
          <div class="chat-msgs" id="d-msgs"></div>
          <div class="chat-input-row">
            <textarea class="chat-ta" id="d-input" rows="1"
              placeholder="Say something…"
              onkeydown="ckEnter(event)"
              oninput="autoR(this)"></textarea>
            <button class="chat-send" id="d-send" onclick="doChat()">↑</button>
          </div>
        </div>
      </div>

      <!-- 右侧：乱数游戏入口 -->
      <div class="game-side game-side-right" id="game-btn-1" onclick="bjOpen(1)">
        <div class="game-side-icon">♦</div>
        <div class="game-side-label">与乱数<br>玩一局</div>
        <div class="game-side-sub">21 POINT</div>
      </div>

    </div>
  </div>

  <div style="height:100px"></div>
</div>

<!-- ════════ MUSIC PLAYER ════════ -->
<div id="mp">
  <div class="mp-panel" id="mp-panel">
    <div class="mp-tname" id="mp-tname">—</div>
    <div class="mp-tart" id="mp-tart">—</div>
    <div class="mp-prog" id="mp-prog" onclick="mpSeek(event)">
      <div class="mp-fill" id="mp-fill"></div>
    </div>
    <div class="mp-ctrls">
      <button class="mpb" onclick="mpPrev()">⏮</button>
      <button class="mp-pp" id="mp-pp" onclick="mpToggle()">▶</button>
      <button class="mpb" onclick="mpNext()">⏭</button>
      <button class="mpb" onclick="mpTogglePl()">≡</button>
    </div>
    <div class="mp-list" id="mp-list">
      <div id="pl-items"></div>
    </div>
  </div>
  <button class="mp-fab" id="mp-fab" onclick="mpTogglePanel()">♪</button>
</div>

<!-- ════════ BLACKJACK GAME ════════ -->
<div id="bj-modal">
  <div class="bj-wrap">

    <!-- 角色头像区 -->
    <div class="bj-char-area">
      <div class="bj-char-av" id="bj-char-av">—</div>
      <div class="bj-char-name" id="bj-char-name">—</div>
      <div class="bj-char-line" id="bj-char-line">准备好了吗？</div>
    </div>

    <!-- 牌桌区 -->
    <div class="bj-table">

      <div class="bj-close-row">
        <span class="bj-title">21 POINT</span>
        <button class="bj-close-btn" onclick="bjClose()">✕</button>
      </div>

      <!-- 庄家 -->
      <div class="bj-zone">
        <div class="bj-zone-lbl">庄家 <span id="bj-dealer-score"></span></div>
        <div class="bj-cards" id="bj-dealer-cards"></div>
      </div>

      <!-- 分割线 -->
      <div class="bj-divider"></div>

      <!-- 玩家 -->
      <div class="bj-zone">
        <div class="bj-zone-lbl">你 <span id="bj-player-score"></span></div>
        <div class="bj-cards" id="bj-player-cards"></div>
      </div>

      <!-- 结果提示 -->
      <div class="bj-result" id="bj-result"></div>

      <!-- 操作按钮 -->
      <div class="bj-actions" id="bj-actions">
        <button class="bj-btn bj-btn-hit"   onclick="bjHit()">要牌 HIT</button>
        <button class="bj-btn bj-btn-stand" onclick="bjStand()">停牌 STAND</button>
      </div>
      <div class="bj-actions" id="bj-restart" style="display:none">
        <button class="bj-btn bj-btn-restart" onclick="bjRestart()">再来一局</button>
      </div>

    </div>
  </div>
</div>

<!-- ════════ GALLERY MODAL ════════ -->
<div id="gal-modal">
  <div class="gal-modal-head">
    <div class="gal-modal-title" id="gal-modal-title">画廊</div>
    <button class="gal-modal-close" onclick="galModalClose()">✕ CLOSE</button>
  </div>
  <div class="gal-masonry" id="gal-masonry"></div>
</div>

<!-- ════════ LIGHTBOX ════════ -->
<div id="lb" onclick="lbClose()">
  <button class="lb-x">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<audio id="aud"></audio>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
